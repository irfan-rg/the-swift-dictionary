name: Daily Word of the Day Image

on:
  schedule:
    # Primary + fallback schedule in IST (GitHub cron uses UTC).
    # 12:00 PM IST -> 06:30 UTC, fallback at 12:08 PM IST -> 06:38 UTC.
    - cron: '30 6 * * *'
    - cron: '38 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-image:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    
    steps:
      - name: Download WOTD Images (Front & Back)
        run: |
          set -euo pipefail
          DATE=$(date +%Y-%m-%d)
          mkdir -p wotd-images

          # Update this if your production domain changes.
          BASE_URL="https://www.the-swift-dictionary.me"
          echo "Using BASE_URL=${BASE_URL}"
          
          echo "Downloading front side..."
          curl --fail --silent --show-error --location \
            --output "wotd-images/wotd-${DATE}-front.png" \
            "${BASE_URL}/api/wotd/image?side=front"
          
          echo "Downloading back side..."
          curl --fail --silent --show-error --location \
            --output "wotd-images/wotd-${DATE}-back.png" \
            "${BASE_URL}/api/wotd/image?side=back"

          test -s "wotd-images/wotd-${DATE}-front.png"
          test -s "wotd-images/wotd-${DATE}-back.png"
          
          echo "Downloaded:"
          ls -la wotd-images/
      
      - name: Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DATE=$(date +%Y-%m-%d)
          BASE_URL="https://www.the-swift-dictionary.me"

          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret"
            exit 1
          fi

          # If fallback cron also fires, skip if there is already a successful scheduled run today.
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            TODAY_UTC=$(date -u +%Y-%m-%d)
            RUNS_API="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/wotd-image.yml/runs?branch=${GITHUB_REF_NAME}&event=schedule&status=completed&per_page=30"

            PREV_SUCCESS_COUNT=$(curl --silent --show-error \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "${RUNS_API}" | jq -r --arg today "${TODAY_UTC}" --arg run_id "${GITHUB_RUN_ID}" '[.workflow_runs[] | select((.id | tostring) != $run_id) | select(.conclusion == "success") | select((.run_started_at // "") | startswith($today))] | length')

            if [ "${PREV_SUCCESS_COUNT}" -gt 0 ]; then
              echo "A successful scheduled run already happened today (${TODAY_UTC}). Skipping duplicate run."
              exit 0
            fi
          fi

          # Re-check images before sending so this step fails fast with a clear reason.
          test -s "wotd-images/wotd-${DATE}-front.png"
          test -s "wotd-images/wotd-${DATE}-back.png"

          echo "Fetching custom Instagram caption..."
          CAPTION_JSON=$(curl --silent --show-error "${BASE_URL}/api/wotd/caption" || true)
          CAPTION_TEXT=$(echo "${CAPTION_JSON}" | jq -r '.caption // empty' 2>/dev/null || true)

          if [ -z "${CAPTION_TEXT}" ]; then
            CAPTION_TEXT="Word of the Day - ${DATE}"
          fi

          echo "Constructing MEDIA JSON for telegram..."
          MEDIA=$(jq -n -c --arg caption "${CAPTION_TEXT}" '[{"type":"photo","media":"attach://front","caption":$caption},{"type":"photo","media":"attach://back"}]')
          echo "${MEDIA}" | jq -e 'type == "array" and length == 2 and .[0].media == "attach://front" and .[1].media == "attach://back"' >/dev/null

          RESPONSE=$(curl --silent --show-error --location \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMediaGroup" \
            --form-string "chat_id=${TELEGRAM_CHAT_ID}" \
            --form-string "media=${MEDIA}" \
            -F "front=@wotd-images/wotd-${DATE}-front.png" \
            -F "back=@wotd-images/wotd-${DATE}-back.png")

          echo "Telegram API response: ${RESPONSE}"
          echo "${RESPONSE}" | grep -q '"ok":true' || (echo "Telegram send failed" && exit 1)

          echo "Sent to Telegram"
      
      - name: Upload as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: wotd-${{ github.run_id }}
          path: wotd-images/
          retention-days: 30
